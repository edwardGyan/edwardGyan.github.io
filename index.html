<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 2rem;
      text-align: center;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 2rem;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #020617;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid #1e293b;
      transition: transform 0.2s ease, border 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #38bdf8;
    }

    .card h3 {
      margin-top: 0;
    }

    .card p {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .card a {
      display: inline-block;
      margin-top: 1rem;
      text-decoration: none;
      color: #38bdf8;
    }

    footer {
      text-align: center;
      padding: 1rem;
      border-top: 1px solid #1e293b;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Your Name</h1>
  <p>Backend Developer | Python | Django | Data Enthusiast</p>
</header>

<div class="container">
  <h2>Projects</h2>
  <div class="projects" id="projects"></div>
</div>

<footer>
  <p>© 2026 Your Name</p>
</footer>

<script>
  const projects = [
    {
      name: "Auto File Organizer",
      description: "Automatically sorts files in your Downloads folder by type.",
      link: "https://github.com/yourusername/auto-file-organizer"
    },
    {
      name: "School Review Platform",
      description: "Glassdoor-style review system for schools built with Django.",
      link: "https://github.com/yourusername/school-review"
    }
  ];

  const container = document.getElementById("projects");

  projects.forEach(project => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${project.name}</h3>
      <p>${project.description}</p>
      <a href="${project.link}" target="_blank">View Project →</a>
    `;

    container.appendChild(card);
  });
</script>

</body>
</html>
